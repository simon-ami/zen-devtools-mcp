version: '3.8'

services:
  zen-devtools-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: zen-devtools-mcp:latest
    container_name: zen-devtools-mcp
    stdin_open: true
    tty: true
    environment:
      - NODE_ENV=production
      - ZEN_HEADLESS=true
      - ZEN_PATH=
      - VIEWPORT=1280x720
      - AUTO_PROFILE=true
      - DEBUG=
    # This image does not bundle Zen Browser. Mount or install Zen and set ZEN_PATH.
    # network_mode: "host"
    volumes:
      # Mount dist for quick testing
      - ./dist:/app/dist:ro
    restart: unless-stopped
